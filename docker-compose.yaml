


services:
  
  pedalhunt-proxy:
    image: nginx:alpine
    container_name: pedalhunt-proxy
    hostname: pedalhunt-proxy
    networks:
      - pedalhunt
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pedalhunt-api


  pedalhunt-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: pedalhunt-api
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app
    hostname: pedalhunt-api
    container_name: pedalhunt-api
    networks:
      - pedalhunt
    ports:
      - 8000:8000
    

networks:
  pedalhunt:
    


